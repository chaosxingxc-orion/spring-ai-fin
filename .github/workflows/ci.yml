name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Maven build + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven verify (compile + unit + integration tests)
        run: mvn -B -ntp --strict-checksums verify

      - name: Architecture-sync gate
        run: bash gate/check_architecture_sync.sh

      - name: Architecture-sync self-test
        run: bash gate/test_architecture_sync_gate.sh

      - name: Operator-shape smoke gate (W0 will fail without artifact; expected pre-W0 close)
        run: bash gate/run_operator_shape_smoke.sh || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
