# ledger_coverage, readme_to_files, rule_8_state_consistency) is a W1
# deliverable per REM-2026-05-08-C5-9. Cycle-5 delivers only the
# manifest skeleton + a basic gate rule that warns on obvious mismatches.
#
# Maintainers update this file in the same commit that produces the
# matching delivery + log.

