# spring-ai-fin evidence manifest (v3; cycle-8 evidence graph closure).
#
# Per docs/systematic-architecture-remediation-plan-2026-05-08-cycle-8.en.md
# sec-B1, sec-B2, sec-B3, sec-B4 and
# docs/systemic-remediation-operating-plan-2026-05-08.en.md Phase 1.
#
# Schema v3 closes the evidence graph: every identity field is explicit, every
# log slot has a state from the closed enum, no TBD anywhere in delivery-valid
# fields. The two-SHA model from cycle-7 is preserved.
#
# State enum (per Phase 1 sec-3):
#   pass | fail | missing_blocker | not_applicable | historical_only
#   pre_audit_trail   (architectural-commit-only sentinel)
#
# Updated by the same commit that produces a delivery file + log.
# The architecture-sync gate's audit_trail_shape rule enforces:
#   - HEAD == reviewed_content_sha (direct), OR
#   - HEAD's parent == reviewed_content_sha
#     AND HEAD's diff vs reviewed_content_sha is a subset of
#     allowed_audit_trail_paths.

version: 3
schema_version: evidence-manifest/v3

# Cycle-8 sec-B3: schema_capabilities are machine-readable booleans for
# manifest-driven gate rule completeness. true means the gate enforces it now.
schema_capabilities:
  head_coverage: true                            # cycle-7 audit_trail_shape
  delivery_log_parity: true                      # cycle-6 + cycle-7 + cycle-8
  delivery_log_exact_binding: true               # cycle-8 sec-B1
  manifest_no_tbd: true                          # cycle-8 sec-B3
  manifest_no_null_log_slots: true               # cycle-8 sec-B3
  status_ledger_parity: true                     # cycle-7
  index_freshness: true                          # cycle-7
  active_corpus_registry_used: true              # cycle-8 sec-D1
  ascii_only_active_corpus: true                 # cycle-8 sec-D1
  eol_policy: true                               # cycle-8 sec-A1
  rule_8_state_consistency: true                 # cycle-8 sec-C2
  self_test_required_for_delivery: true          # cycle-8 sec-A2
  active_corpus_no_disposition_in_active: true   # cycle-9 sec-A1, B1
  index_active_subset: true                      # cycle-9 sec-B2
  actionguard_5stage_invariants: true            # cycle-9 sec-C1, C2
  local_vs_delivery_pass_distinguished: true     # cycle-9 sec-A2
  dependency_mode_recorded: true                 # cycle-9 sec-D2
  rule_8_eligibility_recorded: true              # cycle-9 sec-D2
  rule_8_state_machine_coherent: true            # cycle-14 B1: artifact_present_state <-> rule_8.state cross-validation
  ci_no_or_true_mask: true                       # cycle-14 A1: gate/run_* + || true forbidden in CI workflows
  local_only_log_path_enforced: true             # cycle-14 A2: local-only runs always evidence_valid_for_delivery=false + gate/log/local/
  ledger_coverage_finding_to_capability: false   # W1
  cross_platform_ci_matrix: false                # W1
  fixture_test_suite: false                      # W1
  capability_registry_separated: false           # W1

# ---- Two-SHA evidence model (cycle-7 sec-B1; cycle-8 sec-B3) ----
#
# evidence_commit_sha is NOT stored: it equals git rev-parse HEAD by
# definition at evidence emit time. Storing it as TBD reverses the direction
# of cycle-8's remediation. The gate derives it from HEAD when verifying
# audit_trail_shape.

reviewed_content_sha: 18d637e                       # W0 architectural SHA (Maven Wrapper + Boot 4 / AI 2.0-M5 upgrade + OSS BoM U2 + Tier C manifest + gate style fix)
evidence_commit_parent_sha: 18d637e                 # MUST equal reviewed_content_sha (gate enforced)
evidence_commit_classification: audit_trail_only    # one of: direct_reviewed_content | audit_trail_only

# Backward compatibility with v1/v2 readers (cycle-5/cycle-6/cycle-7).
reviewed_sha: 18d637e

current_head_policy:
  accepted_shapes:
    - direct_reviewed_content
    - one_parent_audit_trail_only
  allowed_audit_trail_paths:
    - docs/delivery/**
    - docs/governance/architecture-status.yaml
    - docs/governance/current-architecture-index.md
    - docs/governance/evidence-manifest.yaml
    - gate/log/**

# ---- Delivery and logs (cycle-8 sec-B1, sec-B2, sec-B3) ----

delivery_file: docs/delivery/2026-05-10-18d637e.md   # W0 delivery: Boot 4 / AI 2.0-M5 + OSS BoM U2 + Tier C manifest

# Per cycle-8 sec-B3: log slots use the explicit state enum, never null.
# Per cycle-8 sec-B1: when state == pass, path MUST exist and the log's
# "sha" field MUST equal reviewed_content_sha or evidence_commit_sha.

architecture_sync_logs:
  posix:
    state: pass
    path: gate/log/18d637e-posix.json
    log_sha: 18d637e
  windows:
    state: missing_blocker
    path: null
    reason: "pwsh not available in W0 author environment. CI matrix (W1 deliverable) will produce gate/log/18d637e-windows.json."
  prior_delivery_valid_logs:
    - gate/log/81ff802-posix.json     # cycle-6 architectural
    - gate/log/302337f-posix.json     # cycle-5 architectural
    - gate/log/a070a77.json           # cycle-4 (pre-suffix naming)
  cycle_5_platform_suffix_in_effect_starting: 302337f
  legacy_exemptions:
    # Cycle-8 sec-B2: deliveries before platform-suffix naming get an explicit
    # legacy exemption so delivery_log_parity does not require a per-platform
    # log for them. Pure historical record.
    - delivery_file: docs/delivery/2026-05-08-7025ac9.md
      reason: pre_platform_suffix_legacy
      log: gate/log/7025ac9.json
    - delivery_file: docs/delivery/2026-05-08-003ed6f.md
      reason: pre_platform_suffix_legacy
      log: gate/log/003ed6f.json
    - delivery_file: docs/delivery/2026-05-08-a070a77.md
      reason: pre_platform_suffix_legacy
      log: gate/log/a070a77.json
    - delivery_file: docs/delivery/2026-05-08-d284232.md
      reason: pre_platform_suffix_legacy
      log: gate/log/d284232.json

operator_shape_logs:
  posix:
    state: missing_blocker
    path: null
    reason: "FAIL_NEEDS_BUILD (pom.xml + src present; no built JAR under agent-platform/target/; W0 mvn verify pending CI). Logs go to gate/log/local/ (gitignored) and are NOT delivery evidence. Full Rule 8 real-flow remains W4 deliverable."
  windows:
    state: missing_blocker
    path: null
    reason: "FAIL_NEEDS_BUILD + pwsh availability not assumed; same blocker as posix."
  unblocks_at: W4   # real Rule 8 flow (real deps + N>=3 sequential runs) is W4; advance to FAIL_NEEDS_REAL_FLOW once JAR built

# Cycle-8 sec-A2 + cycle-9 sec-A2: self-test PASS at the evidence commit
# SHA is required for delivery validity. The pass type below
# distinguishes a local-only run from a delivery-valid run.
self_test:
  state: pass
  pass_sha: 18d637e
  log_path: gate/log/self-test-18d637e.json
  blocking_for_delivery: true
  pass_type: delivery_valid_pass    # one of: local_semantic_pass | delivery_valid_pass

# Cycle-9 sec-D2: distinguish CI smoke from Rule 8 evidence.
# `dependency_mode` records whether downstream dependencies were real or
# fake. `rule_8_eligible` records whether this run is allowed to claim
# Rule 8 PASS. A delivery file's Rule 8 claim is rejected if
# `dependency_mode=fake` OR `rule_8_eligible=false`.
operator_shape_evidence:
  dependency_mode: fake             # one of: fake | real | not_applicable
  rule_8_eligible: false            # only true when dependency_mode=real AND artifact_present_state=jar_present
  provider_access_log_evidence: null   # path to log proving real-provider HTTP traffic
  reason: "W0: artifact built locally (mvn verify GREEN at 18d637e); JAR in target/ (gitignored). No real-dependency long-lived run. Real-dependency N>=3 runs land in W4; CI smoke remains rule_8_eligible=false until then."

rule_8:
  state: fail_closed_needs_real_flow  # W0: JAR built locally; no real-dep N>=3 sequential runs (W4 deliverable)
  pass_sha: null
  blocking_findings:
    - "No real-dependency long-lived process run (W4 deliverable)"
    - "No N>=3 sequential real-LLM runs (W4 deliverable)"
    - "No cross-context resource stability proof (W4 deliverable)"
  unblocks_at: W4   # full Rule 8 flow per docs/plans/engineering-plan-W0-W4.md sec-6
  # Cycle-8 sec-C2: rule_8_state_consistency assertion targets.
  no_capability_above_l2_unless_pass: true
  no_evidence_state_operator_gated_unless_pass: true

