# Per docs/systematic-architecture-remediation-plan-2026-05-08-cycle-5.en.md §F1.
#
# This file is the machine-readable binding between:
#   - the reviewed SHA
#   - the delivery file at that SHA
#   - the architecture-sync logs by platform
#   - the operator-shape logs by platform
#   - the status-ledger findings the cycle addressed
#   - the authoritative document index version
