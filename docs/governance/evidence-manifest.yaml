# spring-ai-fin evidence manifest (v2; cycle-7 sec-B1).
#
# Per docs/systematic-architecture-remediation-plan-2026-05-08-cycle-5.en.md sec-F1
# and cycle-6 sec-A2, with cycle-7 sec-B1 two-SHA model upgrade.
#
# Schema v2 distinguishes "reviewed content" from "evidence commit" so the
# audit-trail commit pattern is machine-verifiable, not a prose convention.
#
# Updated by the same commit that produces a delivery file + log.
# The architecture-sync gate's audit_trail_shape rule enforces:
#   - HEAD == reviewed_content_sha (direct), OR
#   - HEAD == evidence_commit_sha AND HEAD's parent == reviewed_content_sha
#     AND HEAD's diff vs reviewed_content_sha is a subset of
#     allowed_audit_trail_paths.

version: 2
schema_version: evidence-manifest/v2

# Cycle-7 sec-B3: schema_capabilities are machine-readable booleans for
# manifest-driven gate rule completeness. true means the gate enforces it now.
schema_capabilities:
  head_coverage: true                      # cycle-7 audit_trail_shape rule
  delivery_log_parity: true                # cycle-6 + cycle-7 (sha + semantic + evidence)
  status_ledger_parity: true               # cycle-7 manifest_edge_consistency
  index_freshness: true                    # cycle-7 manifest_edge_consistency
  rule_8_state_parity: false               # W1 deliverable
  ledger_coverage_finding_to_capability: false   # W1 deliverable

# ---- Two-SHA evidence model (cycle-7 sec-B1) ----

reviewed_content_sha: ba4bcd5                       # cycle-7 architectural SHA
evidence_commit_sha: TBD                            # set to HEAD by gate; not stored authoritatively
evidence_commit_parent_sha: ba4bcd5                 # MUST equal reviewed_content_sha (gate enforced)
evidence_commit_classification: audit_trail_only    # one of: direct_reviewed_content | audit_trail_only

# Backward compatibility with v1 readers (cycle-5/cycle-6).
reviewed_sha: ba4bcd5

current_head_policy:
  accepted_shapes:
    - direct_reviewed_content
    - one_parent_audit_trail_only
  allowed_audit_trail_paths:
    - docs/delivery/**
    - docs/governance/architecture-status.yaml
    - docs/governance/current-architecture-index.md
    - docs/governance/evidence-manifest.yaml
    - gate/log/**

# ---- Delivery and logs ----

delivery_file: docs/delivery/2026-05-08-ba4bcd5.md   # cycle-7 delivery

architecture_sync_logs:
  # Cycle-7 sec-B1 bootstrap policy: the manifest does not name a log keyed
  # to reviewed_content_sha because the gate cannot have run at that SHA with
  # the audit-trail-current manifest (chicken-and-egg). delivery_log_parity
  # iterates docs/delivery/2026-05-08-*.md filenames; if a matching
  # gate/log/<sha>-{posix,windows,legacy}.json exists, it is checked. The
  # canonical pass-evidence is the gate's stdout PASS line at the
  # audit-trail SHA, captured in CI / dev terminal at run time.
  posix: null
  windows: null
  prior_delivery_valid_logs:
    - gate/log/81ff802-posix.json     # cycle-6 architectural
    - gate/log/302337f-posix.json     # cycle-5 architectural
    - gate/log/a070a77.json           # cycle-4 (pre-suffix naming)
  cycle_5_platform_suffix_in_effect_starting: 302337f

operator_shape_logs:
  posix: null    # gate/log/local/operator-shape-<sha>-posix.json (gitignored fail-closed)
  windows: null  # gate/log/local/operator-shape-<sha>-windows.json (gitignored fail-closed)
  notes: |
    Operator-shape smoke produces FAIL_ARTIFACT_MISSING. Logs go to
    gate/log/local/ (gitignored) and are NOT delivery evidence.

rule_8:
  state: fail_closed_artifact_missing
  pass_sha: null
  blocking_findings:
    - "No pom.xml at repo root"
    - "No agent-platform/pom.xml"
    - "No agent-runtime/pom.xml"
    - "No agent-platform/src/main/java tree"
    - "No agent-runtime/src/main/java tree"
  unblocks_at: W0   # docs/plans/W0-evidence-skeleton.md

