# Rule 28 — Code-as-Contract enforcer index
#
# Every architectural constraint in the corpus (CLAUDE.md, ARCHITECTURE.md,
# every */ARCHITECTURE.md, every ADR, every plan under docs/plans/) MUST map
# to at least one row in this file.
#
# Row schema (all fields required as of W1 Layered-4+1 wave; see ADR-0068):
#   id            - stable identifier (E<n>); never reused
#   constraint_ref- citation back to the constraint (file + section or rule number)
#   kind          - one of: archunit | gate-script | integration | schema | compile-time
#   level         - one of: L0 | L1 | L2   (CLAUDE.md Rule 33)
#   view          - one of: logical | development | process | physical | scenarios   (CLAUDE.md Rule 33)
#   artifact      - relative path to the enforcer code (and optional #anchor)
#   asserts       - one-line description of what the enforcer asserts
#
# level convention:
#   L0  - cross-module governing-principle enforcers (P-A..P-D), meta-coverage rules.
#   L1  - per-module / per-vertical contract enforcers (run HTTP, tenant, telemetry, etc.).
#   L2  - feature-specific deep-technical enforcers (none at W1 entry).
#
# view convention:
#   logical      - domain model, entity / status semantics, contract surface.
#   development  - package structure, dependency direction, naming, SPI purity.
#   process      - concurrency, async lifecycle, state machine, posture / boot guard,
#                  request-filter chain, body-of-request lifetime.
#   physical     - deployment topology, sandbox / OS-level isolation, storage placement.
#   scenarios    - cross-view golden-link checks; meta-coverage checks on the
#                  governance corpus itself.
#
# Authority: ADR-0059 (Code-as-Contract) + ADR-0068 (Layered 4+1 + Graph).
# Self-enforced by gate rule 28f (enforcers_yaml_wellformed), 28i
# (plan_enforcer_table_in_sync), 37 (architecture_artefact_front_matter), and
# 40 (enforcer_reachable_from_principle).

