# Rule 28 — Code-as-Contract enforcer index
#
# Every architectural constraint in the corpus (CLAUDE.md, ARCHITECTURE.md,
# every */ARCHITECTURE.md, every ADR, every plan under docs/plans/) MUST map
# to at least one row in this file.
#
# Row schema (all fields required):
#   id            - stable identifier (E<n>); never reused
#   constraint_ref- citation back to the constraint (file + section or rule number)
#   kind          - one of: archunit | gate-script | integration | schema | compile-time
#   artifact      - relative path to the enforcer code (and optional #anchor)
#   asserts       - one-line description of what the enforcer asserts
#
# Authority: ADR-0059. Self-enforced by gate rule 28f (enforcers_yaml_wellformed)
# and rule 28i (plan_enforcer_table_in_sync). L1 plan §11 is the human mirror.

