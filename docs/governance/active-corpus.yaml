# spring-ai-fin active-corpus registry.
#
# Per docs/systemic-remediation-operating-plan-2026-05-08.en.md Phase 3,
# docs/systematic-architecture-remediation-plan-2026-05-08-cycle-8.en.md
# sec-D1, and docs/systematic-architecture-remediation-plan-2026-05-09-cycle-9.en.md
# sec-A1/B1.
#
# Cycle-9 truth-cut: the registry is split into THREE exclusive
# sections. No document may appear in more than one section. The
# `active_documents` section is reserved for refresh-active sources of
# truth -- entries with any disposition marker (renamed_to, moved_to,
# merged_into, replaced_by, deferred_*) are forbidden under
# `active_documents` and trigger the gate rule
# `active_corpus_no_disposition_in_active`.
#
# Schema:
#   active_documents:
#     - path: <repo-relative-path>
#       layer: L0|L1|L2|cross_cutting|governance|plan|gate|module
#       owner: <team-or-stream>
#       encoding_policy: ascii|utf8_clean
#   transitional_rationale:
#     - path: <repo-relative-path>
#       reason: <one-line rationale>
#       supersedes_to: <refresh-active path or NONE>
#       sunset_by: <W0|W1|...|specific date>
#       banner_required: true|false
#       active_scan: false
#   historical_documents:
#     - path: <repo-relative-path>
#       reason: <one-line rationale>
#       active_scan: false
#       banner_required: true|false

version: 2
