# spring-ai-fin active-corpus registry.
#
# Per docs/systemic-remediation-operating-plan-2026-05-08.en.md Phase 3 and
# docs/systematic-architecture-remediation-plan-2026-05-08-cycle-8.en.md
# sec-D1.
#
# Purpose: replace the ad-hoc filename-skip patterns inside the gate with a
# single machine-readable registry. The architecture-sync gate derives its
# scan list from this file. Encoding (`ascii_only_active_corpus`) and
# closure-language rules apply to every entry under `active_documents`.
# Documents under `historical_documents` are explicitly excluded with a
# reason.
#
# Schema:
#   active_documents:
#     - path: <repo-relative-path>
#       layer: L0|L1|L2|cross_cutting|governance|plan|gate
#       owner: <team-or-stream>
#       encoding_policy: ascii|utf8_clean
#   historical_documents:
#     - path: <repo-relative-path>
#       reason: <one-line rationale>
#       active_scan: false
#       banner_required: true|false
#
# Update rule: when a new authoritative L2 lands or a current document is
# superseded, update this file in the same PR. The architecture-sync gate's
# `active_corpus_registry_freshness` rule (W1 deliverable) will fail if the
# registry is stale relative to the docs tree.

version: 1
schema_version: active-corpus/v1
generated_at: 2026-05-08
