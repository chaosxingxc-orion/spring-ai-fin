# DFX (Design-for-X) declaration for the agent-platform module.
#
# Required by CLAUDE.md Rule 32 — every module declared `kind: platform` or
# `kind: domain` MUST publish a DFX yaml covering all five dimensions.
#
# Authority: ADR-0067. Enforced by gate rule dfx_yaml_present_and_wellformed.

module: agent-platform
kind: platform
version: 1
generated_at: 2026-05-14

releasability:
  artifact_coords: "io.github.springai-ascend:agent-platform"
  semver_policy: "0.x — API may break; bumps documented in release notes"
  deprecation_window: "one minor version with @Deprecated + javadoc note before removal"
  packaging: "spring-boot-starter compatible jar; consumes BoM spring-ai-ascend-dependencies"

resilience:
  fallback_paths: []
  posture_aware_defaults: "dev permissive; research/prod fail-closed at startup via PostureBootGuard"
  cancellation_contract: "POST /v1/runs/{id}/cancel; idempotent terminal->terminal returns 200; illegal transitions return 409 (E24)"
  reference_rule: "CLAUDE.md Rule 7 (Resilience Must Not Mask Signals) — deferred to W2 alongside first soft-fallback"

availability:
  health_endpoints:
    - "GET /v1/health — liveness; JSON {status, sha, db_ping_ns, ts}"
  readiness_signal: "deferred to W2 (depends on durable IdempotencyStore + Postgres readiness)"
  startup_failure_modes:
    - "research/prod posture with @RequiredConfig field missing -> IllegalStateException (E21)"
    - "research/prod posture with idempotency in-memory bean -> IllegalStateException (E22)"

vulnerability:
  scan_tooling: "manual review at L1; automated CVE/SCA scanner deferred per CLAUDE-deferred.md 32.d"
  auth_surface: "JWT RS256 with iss/aud/exp/nbf/clock-skew validation (E9)"
  tenant_isolation: "X-Tenant-Id header + JWT tenant_id claim cross-check at filter chain (E10); MDC tenant_id populated"
  secret_handling: "no AKIA/sk-/BEGIN PRIVATE KEY patterns in tracked files (E20 gate-rule no_secret_patterns)"

observability:
  metric_namespace: "springai_ascend_* (E18 gate-enforced)"
  high_cardinality_protection: "TenantTagMeterFilter strips tenant_id from raw meter tags (E19 high_cardinality_tag_guard)"
  trace_propagation: "TraceExtractFilter at filter-order 10 extracts/originates W3C traceparent; emits traceresponse on outbound (E41)"
  log_field_shape: "MDC carries tenant_id + trace_id + span_id during request scope (E42)"
  api_contract_surface: "OpenAPI snapshot pinned at docs/contracts/openapi-v1.yaml (E25); live-vs-snapshot drift detected by E36"
