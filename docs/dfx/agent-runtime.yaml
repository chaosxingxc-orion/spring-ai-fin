# DFX (Design-for-X) declaration for the agent-runtime module.
#
# Required by CLAUDE.md Rule 32 — every module declared `kind: domain` MUST
# publish a DFX yaml covering all five dimensions.
#
# Authority: ADR-0067. Enforced by gate rule dfx_yaml_present_and_wellformed.

module: agent-runtime
kind: domain
version: 1
generated_at: 2026-05-14

releasability:
  artifact_coords: "io.github.springai-ascend:agent-runtime"
  semver_policy: "0.x — SPI is contract-frozen at L1 inside *.spi.* packages; non-SPI may change without major bump"
  deprecation_window: "two minor versions on SPI; one on non-SPI"
  packaging: "library jar consumed by agent-platform and starter modules"

resilience:
  fallback_paths: []
  posture_aware_defaults: "in-memory reference impls (SyncOrchestrator/SequentialGraphExecutor/IterativeAgentLoopExecutor/InMemoryRunRegistry/InMemoryCheckpointer) call AppPostureGate.requireDevForInMemoryComponent — research/prod fail-closed via IllegalStateException"
  cancellation_contract: "RunStateMachine DFA (Rule 20) — PENDING/RUNNING/SUSPENDED -> CANCELLED legal; terminal -> 409"
  reference_rule: "Rule 20 (Run state transitions) — active; Rule 23 (suspension atomicity) — deferred to W2"

availability:
  health_endpoints: []   # runtime is a library; agent-platform owns the HTTP health probe
  readiness_signal: "library-internal — readiness is the union of dependent beans (Orchestrator + RunRepository + Checkpointer)"
  startup_failure_modes:
    - "research/prod posture instantiating an in-memory reference impl -> IllegalStateException (Gate Rule 12 inmemory_orchestrator_posture_guard_present)"
    - "Run.withStatus illegal transition -> IllegalStateException (Rule 20, E23)"

vulnerability:
  scan_tooling: "manual review at L1; automated CVE/SCA scanner deferred per CLAUDE-deferred.md 32.d"
  tenant_isolation: "RunContext.tenantId() is the sole tenant carrier inside runtime; TenantContextHolder import forbidden by ArchUnit Rule 21 (E2)"
  payload_integrity: "InMemoryCheckpointer enforces §4 #13 16-KiB inline cap (E11); PayloadCodec discipline (Rule 22) deferred to W2"
  spi_purity: "*.spi.* packages import only java.* (E3, generalized by E48 SpiPurityGeneralizedArchTest)"

observability:
  metric_namespace: "springai_ascend_* (shared with agent-platform per E18)"
  trace_carrier: "TraceContext SPI in orchestration/spi/ (default NoopTraceContext); RunContext exposes traceId()/spanId()/sessionId()/traceContext() (E39 RunContextIdentityAccessorsTest)"
  hook_emission_path: "every LLM call, tool call, lifecycle boundary MUST flow through HookChain (Rule 19, deferred W2; ArchUnit LlmGatewayHookChainOnlyTest active and vacuous today per E43)"
  audit_trail: "run_state_change audit row deferred to W2 (Rule 24)"
  spi_packages:
    - "ascend.springai.runtime.orchestration.spi"
    - "ascend.springai.runtime.memory.spi"
